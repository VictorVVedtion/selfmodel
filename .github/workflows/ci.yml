name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          shellcheck --severity=error scripts/selfmodel.sh
          shellcheck --severity=error scripts/hooks/*.sh
          shellcheck --severity=error install.sh
          shellcheck --severity=error uninstall.sh

  install-smoke-test:
    name: Install Smoke Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get install -y jq
          fi
      - name: Test selfmodel.sh version
        run: bash scripts/selfmodel.sh version
      - name: Test selfmodel.sh help
        run: bash scripts/selfmodel.sh --help
      - name: Test install.sh (dry run structure check)
        run: |
          # Verify install script is valid bash
          bash -n install.sh
          # Verify uninstall script is valid bash
          bash -n uninstall.sh

  slop-check:
    name: AI Slop Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run slop-detect on scripts
        run: bash scripts/slop-detect.sh scripts/ --strict || true
      - name: Run slop-detect on project (if src/ exists)
        run: |
          if [[ -d "src" ]]; then
            bash scripts/slop-detect.sh src/
          fi

  markdown-links:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'
          check-modified-files-only: 'yes'
          base-branch: 'main'
